services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cryptocore
      POSTGRES_USER: cryptocore
      POSTGRES_PASSWORD: cryptocore
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptocore -d cryptocore"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: ghcr.io/boh1mean/cryptocore:latest
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://cryptocore:cryptocore@postgres:5432/cryptocore
      DATA_DIR: /data/containers
    volumes:
      - containers:/data/containers
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  containers:
