name: Build Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Fyne
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build
        run: fyne package -os windows -src ./cmd/desktop -name CryptoCore -appID com.cryptocore.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoCore-windows
          path: "*.exe"
